<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="15_Temperature Converter.css">
</head>
<body>

<div class="container">

    <h2>🌡 Temperature Converter</h2>

    <form id="form">

        <input type="number" id="temperature" placeholder="Enter Temperature" required>

        <select id="type">
            <option value="ctof">Celsius ➜ Fahrenheit</option>
            <option value="ftoc">Fahrenheit ➜ Celsius</option>
        </select>

        <button type="submit">Convert</button>

    </form>

    <div id="result"></div>

</div>

<script src="15_Temperature Converter.js"></script>

</body>
</html>
