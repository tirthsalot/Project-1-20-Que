<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Withdrawal Simulator</title>
    <link rel="stylesheet" href="13_ATM Withdrawal Simulator.css">
</head>
<body>

    <div class="container">
        <h2>ATM Withdrawal Simulator</h2>

        <form id="form">
            <input type="number" id="balance" placeholder="Enter Balance" required>

            <input type="number" id="withdraw" placeholder="Enter Withdrawal Amount" required>

            <button type="submit">Withdraw Money</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="13_ATM Withdrawal Simulator.js"></script>

</body>
</html>
