<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Discount Calculator</title>
    <link rel="stylesheet" href="14_Shopping Discount Calculator.css">
</head>
<body>

<div class="container">

    <h2>Shopping Discount Calculator</h2>

    <form id="form">

        <input type="number" id="price" placeholder="Enter Product Price" required>

        <input type="number" id="discount" placeholder="Enter Discount (%)" required>

        <button type="submit">Calculate Discount</button>

    </form>

    <div id="result"></div>

</div>

<script src="14_Shopping Discount Calculator.js"></script>

</body>
</html>
