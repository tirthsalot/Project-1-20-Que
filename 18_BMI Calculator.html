<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="18_BMI Calculator.css">
</head>
<body>

<div class="container">

    <h2>🏋️ BMI Calculator</h2>

    <form id="form">

        <input type="number" id="weight" placeholder="Enter Weight (kg)" required>

        <input type="number" id="height" placeholder="Enter Height (cm)" required>

        <button type="submit">Calculate BMI</button>

    </form>

    <div id="result"></div>

</div>

<script src="18_BMI Calculator.js"></script>

</body>
</html>
