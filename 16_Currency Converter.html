<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="16_Currency Converter.css">
</head>
<body>

<div class="container">

    <h2>💱 Currency Converter</h2>

    <form id="form">

        <input type="number" id="amount" placeholder="Enter Amount" required>

        <select id="currency">
            <option value="usd">INR ➜ USD</option>
            <option value="eur">INR ➜ EUR</option>
            <option value="gbp">INR ➜ GBP</option>
        </select>

        <button type="submit">Convert Currency</button>

    </form>

    <div id="result"></div>

</div>

<script src="16_Currency Converter.js"></script>

</body>
</html>
