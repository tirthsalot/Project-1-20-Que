<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal Simulator</title>
    <link rel="stylesheet" href="17_Traffic Signal Simulator.css">
</head>

<body>

    <!-- Road -->
    <div class="street-bg"></div>

    <!-- Grass -->
    <div class="grass"></div>

    <form id="trafficForm">

        <div class="header">
            <h2>🚦 TRAFFIC SIGNAL</h2>
            <p>SMART ROAD CONTROL</p>
        </div>

        <div class="signal-box">

            <button type="button" class="btn-red" id="redBtn"></button>

            <button type="button" class="btn-yellow" id="yellowBtn"></button>

            <button type="button" class="btn-green" id="greenBtn"></button>

        </div>

        <div id="result">
            Click Any Signal
        </div>

    </form>

    <script src="17_Traffic Signal Simulator.js"></script>

</body>
</html>
